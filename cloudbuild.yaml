steps:
- name: gcr.io/cloud-builders/docker
  args:
  - build
  - --no-cache
  - -t
  - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID
  - .
- name: gcr.io/cloud-builders/docker
  args:
  - push
  - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
  - run
  - deploy
  - meta-pipeline
  - --image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID
  - --add-cloudsql-instances=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db
  - --set-env-vars=INSTANCE_CONNECTION_NAME=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_HOST=/cloudsql/project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_USER=postgres,DB_PASS=Meta-pipeline-989898!,DB_NAME=meta_pipeline,GCS_BUCKET_NAME=meta-pipeline-storage,RESEND_FROM_EMAIL=reports@yourverifieddomain.com
  - --set-env-vars=DB_HOST=/cloudsql/project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_USER=postgres,DB_PASS=Meta-pipeline-989898!,DB_NAME=meta_pipeline,GCS_BUCKET_NAME=meta-pipeline-storage,RESEND_FROM_EMAIL=reports@travelbunny.services
  - --region=northamerica-northeast2
  - --platform=managed
  - --allow-unauthenticated
  - --memory=2Gi

images:
- northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID

timeout: 1200s

options:
  machineType: 'E2_HIGHCPU_32'