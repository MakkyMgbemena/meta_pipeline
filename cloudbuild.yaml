steps:
  # -----------------------------------------------------------
  # SERVICE 1: Core Backend (meta-pipeline)
  # -----------------------------------------------------------
  # Step 1: Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args:
      - 'push'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID'

  # -----------------------------------------------------------
  # SERVICE 2: Dashboard (meta-pipeline-dashboard)
  # -----------------------------------------------------------
  # Step 3: Build Dashboard Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Dashboard'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-dashboard:$BUILD_ID'
      - '-f'
      - 'dashboard/Dockerfile'
      - '.'

  # Step 4: Push Dashboard Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Dashboard'
    args:
      - 'push'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-dashboard:$BUILD_ID'

  # -----------------------------------------------------------
  # SERVICE 3: Browser Service (meta-pipeline-browser)
  # -----------------------------------------------------------
  # Step 5: Build Browser Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Browser'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-browser:$BUILD_ID'
      - '-f'
      - 'browser-service/Dockerfile'
      - '.'

  # Step 6: Push Browser Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Browser'
    args:
      - 'push'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-browser:$BUILD_ID'

  # -----------------------------------------------------------
  # DEPLOYMENTS
  # -----------------------------------------------------------
  # Step 7: Deploy Core Backend (Fixed Single --set-env-vars Block)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meta-pipeline'
      - '--image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID'
      - '--add-cloudsql-instances=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db'
      # Unified list of environment variables (with your correct email reports@travelbunny.services)
           # Remove DB_PASS from --set-env-vars and add --set-secrets:
      - '--set-env-vars=INSTANCE_CONNECTION_NAME=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_HOST=/cloudsql/project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_USER=postgres,DB_NAME=meta_pipeline,GCS_BUCKET_NAME=meta-pipeline-storage,RESEND_FROM_EMAIL=reports@travelbunny.services,SELENIUM_REMOTE_URL=$_BROWSER_SERVICE_URL'
      - '--set-secrets=DB_PASS=db-password:latest' # Securely pulls from Secret Manager
      - '--region=northamerica-northeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
# Step 8: Deploy Dashboard (Streamlit)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Dashboard'
    entrypoint: 'gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'meta-pipeline-dashboard'
    - '--image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-dashboard:$BUILD_ID'
    - '--region=northamerica-northeast2'
    - '--platform=managed'
    - '--allow-unauthenticated'
    - '--port=8080'
    - '--set-env-vars=SERVICE_TYPE=streamlit,BACKEND_URL=$_BACKEND_URL'

  # Step 9: Deploy Browser Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Browser'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meta-pipeline-browser'
      - '--image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-browser:$BUILD_ID'
      - '--add-cloudsql-instances=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db'
      - '--set-env-vars=INSTANCE_CONNECTION_NAME=project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_HOST=/cloudsql/project-24b04b3d-fdd9-4b07-855:northamerica-northeast2:meta-pipeline-db,DB_USER=postgres,DB_NAME=meta_pipeline,GCS_BUCKET_NAME=meta-pipeline-storage,RESEND_FROM_EMAIL=reports@travelbunny.services'
      - '--set-secrets=DB_PASS=db-password:latest'
      - '--region=northamerica-northeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--startup-probe-path=/health/browser'
      - '--memory=4Gi' # Matching the memory in service.yaml for heavy browser tasks

images:
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline:$BUILD_ID'
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-dashboard:$BUILD_ID'
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/meta-pipeline/meta-pipeline-browser:$BUILD_ID'

timeout: 3600s

options:
  machineType: 'E2_HIGHCPU_32'
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _BACKEND_URL: https://meta-pipeline-680132354800.northamerica-northeast2.run.app
  _BROWSER_SERVICE_URL: https://meta-pipeline-browser-680132354800.northamerica-northeast2.run.app
