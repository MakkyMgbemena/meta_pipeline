name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-pipeline/meta-pipeline:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy dashboard and backend
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-pipeline/meta-pipeline:${{ github.sha }}
          gcloud run deploy meta-pipeline-backend \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --service-account=dashboard-manager@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars SERVICE_TYPE=fastapi,INSTANCE_CONNECTION_NAME=${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }},GCS_ENABLED=${{ secrets.GCS_ENABLED || 'false' }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME || '' }},BACKEND_URL="$BACKEND_URL",MAX_UPLOAD_MB=${{ secrets.MAX_UPLOAD_MB || '25' }} \
            --memory 4Gi --cpu 2 --timeout 300

          gcloud run deploy meta-pipeline-dashboard \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --service-account=dashboard-manager@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars SERVICE_TYPE=streamlit,BACKEND_URL=https://meta-pipeline-backend-680132354800.northamerica-northeast2.run.app \
            --memory 2Gi --cpu 1 --timeout 300
